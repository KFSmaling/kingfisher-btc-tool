name: Supabase Migrations

on:
  workflow_dispatch:
    # Manual trigger only — migraties worden via Supabase-MCP applied tijdens
    # bouwer-sprints. Workflow blijft beschikbaar als fall-back voor toekomst.
    # Auto-trigger uitgeschakeld om GitHub-fail-mails te vermijden bij
    # migraties die al via Supabase-MCP applied zijn (schema_migrations zegt
    # "already applied" → supabase db push faalt).

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: |
          supabase link --project-ref lsaljhnxclldlyocunqf --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
